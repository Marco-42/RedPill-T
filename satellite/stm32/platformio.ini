; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:redpill_l496]
platform = ststm32
board = nucleo_l496zg ; Most L496 chips work with this definition
framework = arduino

; Serial Monitor speed
monitor_speed = 9600
upload_protocol = stlink

; upload_flags = 
;     -c set CPUTAPID 0x2ba01477
;     -c reset_config none separate

; Libraries (Auto-downloaded)
lib_deps =
    jgromes/RadioLib @ ^6.0.0
    stm32duino/STM32duino FreeRTOS @ ^10.3.1
    stm32duino/STM32duino RTC @ ^1.3.7
    
; Compiler Flags
build_flags = 
    -D ARDUINO_ARCH_STM32
    ; -D HAL_PCD_MODULE_ENABLED ; Enables USB if you need it
    ; -D USBCON ; Uncomment to use native USB instead of UART for Serial
    -D HAL_UART_MODULE_ENABLED